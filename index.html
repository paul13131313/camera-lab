<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レトロカメラフィルター</title>
<meta name="description" content="使い捨てカメラ風フィルターで写真を現像するWebアプリ。彩度・コントラスト・粒子・周辺光量を自由に調整。">
<meta property="og:title" content="レトロカメラフィルター">
<meta property="og:description" content="使い捨てカメラ風フィルターで写真を現像するWebアプリ">
<meta property="og:image" content="https://og-api-self.vercel.app/api/og?title=%E3%83%AC%E3%83%88%E3%83%AD%E3%82%AB%E3%83%A1%E3%83%A9%E3%83%95%E3%82%A3%E3%83%AB%E3%82%BF%E3%83%BC&category=Tools%20%26%20Utility">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#222222">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --bg: #f7f7f7;
    --text: #222222;
    --text-light: #666666;
    --text-muted: #999999;
    --border: #e0e0e0;
    --border-light: #eeeeee;
    --accent: #e60012;
    --black: #222222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--white);
    min-height: 100vh;
    font-family: 'Noto Sans JP', 'Noto Sans', sans-serif;
    font-weight: 300;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── ヘッダー ── */
  header {
    padding: 40px 60px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    border-bottom: 1px solid var(--border);
  }
  .brand {
    font-size: 1.6rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--text);
    line-height: 1;
  }
  .brand span {
    color: var(--accent);
  }
  .tagline {
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.12em;
  }

  /* ── メインレイアウト ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 60px 80px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: start;
  }

  /* ── セクションラベル ── */
  .section-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ── アップロードエリア ── */
  .upload-area {
    position: relative;
    min-height: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: var(--bg);
    transition: background 0.3s;
    border: 1px dashed var(--border);
  }
  .upload-area.drag-over {
    background: #f0f0f0;
    border-color: var(--text-muted);
  }
  .upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-icon {
    font-size: 2rem;
    margin-bottom: 16px;
    opacity: 0.3;
    line-height: 1;
  }
  .upload-text {
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.8;
  }
  .upload-text strong {
    display: block;
    font-size: 0.85rem;
    font-weight: 400;
    color: var(--text-light);
    margin-bottom: 4px;
  }

  /* ── オリジナル画像プレビュー ── */
  #original-preview {
    width: 100%;
    display: none;
    object-fit: contain;
    max-height: 400px;
  }

  /* ── スライダーコントロール ── */
  .controls {
    padding: 0;
    margin-top: 40px;
  }
  .control-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .control-row:last-child { margin-bottom: 0; }
  .ctrl-label {
    font-size: 0.72rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--text-light);
    width: 80px;
    flex-shrink: 0;
  }
  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--text) var(--pct, 50%), var(--border) var(--pct, 50%));
    border-radius: 0;
    cursor: pointer;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--white);
    border: 1.5px solid var(--text);
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.15s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    background: var(--text);
  }
  .ctrl-value {
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--text-muted);
    width: 30px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── プリセットボタン ── */
  .presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 24px;
  }
  .preset-btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 0;
  }
  .preset-btn:hover {
    border-color: var(--text);
    color: var(--text);
  }
  .preset-btn.active {
    background: var(--text);
    color: var(--white);
    border-color: var(--text);
  }

  .divider {
    height: 1px;
    background: var(--border-light);
    margin: 28px 0;
  }

  /* ── キャンバス出力 ── */
  .canvas-wrap {
    position: relative;
    background: var(--bg);
    min-height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #output-canvas {
    max-width: 100%;
    max-height: 440px;
    display: block;
  }
  .canvas-placeholder {
    color: var(--text-muted);
    font-size: 0.8rem;
    font-weight: 300;
    letter-spacing: 0.06em;
    text-align: center;
    line-height: 2;
  }
  .canvas-placeholder .big {
    font-size: 2rem;
    display: block;
    opacity: 0.2;
    margin-bottom: 8px;
  }

  /* ── ダウンロードボタン ── */
  .dl-area {
    margin-top: 24px;
  }
  #dl-btn {
    width: 100%;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.15em;
    padding: 14px 24px;
    background: var(--white);
    color: var(--text);
    border: 1px solid var(--text);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0.3;
    pointer-events: none;
  }
  #dl-btn.active {
    opacity: 1;
    pointer-events: all;
  }
  #dl-btn:hover {
    background: var(--text);
    color: var(--white);
  }
  #dl-btn svg { flex-shrink: 0; }

  /* ── フォトカウンター ── */
  .photo-counter {
    font-size: 0.65rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }
  .photo-counter .num {
    font-size: 1.4rem;
    font-weight: 400;
    color: var(--text-light);
    margin-left: 6px;
    font-variant-numeric: tabular-nums;
  }

  /* ── スペック表示 ── */
  .specs {
    margin-top: 32px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border-light);
    border: 1px solid var(--border-light);
  }
  .spec-item {
    background: var(--white);
    padding: 20px;
  }
  .spec-label {
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .spec-value {
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--text);
  }

  /* ── フッター ── */
  footer {
    border-top: 1px solid var(--border);
    text-align: center;
    padding: 32px 60px;
    font-size: 0.65rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* ── レスポンシブ ── */
  @media (max-width: 768px) {
    header { padding: 24px 24px; }
    .container {
      grid-template-columns: 1fr;
      padding: 32px 24px 48px;
      gap: 40px;
    }
    .brand { font-size: 1.3rem; }
    footer { padding: 24px; }
  }

  /* ── 処理中インジケーター ── */
  .processing {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--text);
    font-weight: 400;
    letter-spacing: 0.2em;
    font-size: 0.75rem;
    z-index: 10;
  }
  .processing.show { display: flex; }
</style>
</head>
<body>

<header>
  <div class="brand">Retro Camera <span>Filter</span></div>
  <div class="tagline">レトロカメラフィルター</div>
</header>

<div class="container">

  <!-- 左パネル：アップロード＆コントロール -->
  <div>
    <div class="section-label">Load Photo</div>
    <div class="upload-area" id="upload-area">
      <input type="file" id="file-input" accept="image/*">
      <div class="upload-icon">📷</div>
      <div class="upload-text">
        <strong>写真をドロップ / クリックして選択</strong>
        JPG · PNG · WEBP
      </div>
    </div>
    <img id="original-preview" alt="original">

    <div class="divider"></div>
    <div class="section-label">Presets</div>
    <div class="presets">
      <button class="preset-btn active" onclick="applyPreset('standard')">標準</button>
      <button class="preset-btn" onclick="applyPreset('vivid')">ビビッド</button>
      <button class="preset-btn" onclick="applyPreset('faded')">フェード</button>
      <button class="preset-btn" onclick="applyPreset('night')">夜撮り</button>
    </div>

    <div class="controls">
      <div class="section-label" style="margin-top: 40px;">Filter Control</div>
      <div class="control-row">
        <span class="ctrl-label">彩度</span>
        <input type="range" id="saturation" min="0" max="200" value="140" oninput="updateSlider(this);processImage()">
        <span class="ctrl-value" id="saturation-val">140</span>
      </div>
      <div class="control-row">
        <span class="ctrl-label">コントラスト</span>
        <input type="range" id="contrast" min="0" max="200" value="130" oninput="updateSlider(this);processImage()">
        <span class="ctrl-value" id="contrast-val">130</span>
      </div>
      <div class="control-row">
        <span class="ctrl-label">明度</span>
        <input type="range" id="brightness" min="80" max="140" value="108" oninput="updateSlider(this);processImage()">
        <span class="ctrl-value" id="brightness-val">108</span>
      </div>
      <div class="control-row">
        <span class="ctrl-label">粒子</span>
        <input type="range" id="grain" min="0" max="80" value="28" oninput="updateSlider(this);processImage()">
        <span class="ctrl-value" id="grain-val">28</span>
      </div>
      <div class="control-row">
        <span class="ctrl-label">周辺光量</span>
        <input type="range" id="vignette" min="0" max="100" value="60" oninput="updateSlider(this);processImage()">
        <span class="ctrl-value" id="vignette-val">60</span>
      </div>
      <div class="control-row">
        <span class="ctrl-label">色温度</span>
        <input type="range" id="warmth" min="-50" max="50" value="12" oninput="updateSlider(this);processImage()">
        <span class="ctrl-value" id="warmth-val">12</span>
      </div>
    </div>
  </div>

  <!-- 右パネル：出力 -->
  <div>
    <div style="display: flex; align-items: baseline; justify-content: space-between;">
      <div class="section-label" style="flex:1;">Developed</div>
      <div class="photo-counter">
        Frame <span class="num" id="frame-no">--</span>
      </div>
    </div>
    <div class="canvas-wrap">
      <div class="processing" id="processing">Developing...</div>
      <canvas id="output-canvas" style="display:none;"></canvas>
      <div class="canvas-placeholder" id="canvas-placeholder">
        <span class="big">🎞</span>
        写真をロードしてください
      </div>
    </div>
    <div class="dl-area">
      <button id="dl-btn" onclick="downloadImage()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 1v9M4 7l4 4 4-4M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
        </svg>
        Save Photo
      </button>
    </div>

    <div class="specs">
      <div class="spec-item">
        <div class="spec-label">ISO</div>
        <div class="spec-value">400</div>
      </div>
      <div class="spec-item">
        <div class="spec-label">Lens</div>
        <div class="spec-value">f/10</div>
      </div>
      <div class="spec-item">
        <div class="spec-label">Flash</div>
        <div class="spec-value">Auto</div>
      </div>
    </div>
  </div>

</div>

<footer>© Retro Camera Filter</footer>

<script>
// ── 状態 ──
let originalImageData = null;
let frameCount = 0;

// ── スライダーのグラデーション更新 ──
function updateSlider(input) {
  const min = +input.min, max = +input.max, val = +input.value;
  const pct = ((val - min) / (max - min) * 100).toFixed(1);
  input.style.setProperty('--pct', pct + '%');
  document.getElementById(input.id + '-val').textContent = val;
}
document.querySelectorAll('input[type="range"]').forEach(updateSlider);

// ── ファイル読み込み ──
const fileInput = document.getElementById('file-input');
const uploadArea = document.getElementById('upload-area');

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // オリジナルプレビュー
      const preview = document.getElementById('original-preview');
      preview.src = e.target.result;
      preview.style.display = 'block';
      uploadArea.querySelector('.upload-icon').style.display = 'none';
      uploadArea.querySelector('.upload-text').style.display = 'none';

      // Canvas に描画してピクセルデータ保持
      const tmpCanvas = document.createElement('canvas');
      const maxW = 1200, maxH = 1200;
      let w = img.width, h = img.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      tmpCanvas.width = w; tmpCanvas.height = h;
      const ctx = tmpCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      originalImageData = ctx.getImageData(0, 0, w, h);

      frameCount++;
      document.getElementById('frame-no').textContent = String(frameCount).padStart(2,'0');
      processImage();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── メインフィルター処理 ──
function processImage() {
  if (!originalImageData) return;

  const processing = document.getElementById('processing');
  processing.classList.add('show');

  setTimeout(() => {
    const saturation  = +document.getElementById('saturation').value / 100;
    const contrast    = +document.getElementById('contrast').value / 100;
    const brightness  = +document.getElementById('brightness').value / 100;
    const grainAmount = +document.getElementById('grain').value;
    const vignette    = +document.getElementById('vignette').value / 100;
    const warmth      = +document.getElementById('warmth').value;

    const canvas = document.getElementById('output-canvas');
    canvas.width  = originalImageData.width;
    canvas.height = originalImageData.height;
    const ctx = canvas.getContext('2d');

    // ピクセルコピー
    const src = originalImageData.data;
    const imageData = ctx.createImageData(canvas.width, canvas.height);
    const dst = imageData.data;
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;

    for (let i = 0; i < src.length; i += 4) {
      let r = src[i], g = src[i+1], b = src[i+2];

      // 1. 明度
      r = r * brightness;
      g = g * brightness;
      b = b * brightness;

      // 2. コントラスト
      r = ((r/255 - 0.5) * contrast + 0.5) * 255;
      g = ((g/255 - 0.5) * contrast + 0.5) * 255;
      b = ((b/255 - 0.5) * contrast + 0.5) * 255;

      // 3. 色温度
      r += warmth * 1.2;
      g += warmth * 0.3;
      b -= warmth * 1.0;

      // 4. 彩度
      const lum = 0.299 * r + 0.587 * g + 0.114 * b;
      r = lum + (r - lum) * saturation;
      g = lum + (g - lum) * saturation;
      b = lum + (b - lum) * saturation;

      // 5. フィルムグレイン
      const noise = (Math.random() - 0.5) * grainAmount * 2;
      r += noise;
      g += noise * 0.95;
      b += noise * 0.9;

      // 6. ビネット
      const px = (i / 4) % W;
      const py = Math.floor((i / 4) / W);
      const dx = (px - cx) / cx;
      const dy = (py - cy) / cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const vig = Math.max(0, 1 - (dist * dist * vignette * 1.2));
      r *= vig; g *= vig; b *= vig;

      // クランプ
      dst[i]   = Math.max(0, Math.min(255, r));
      dst[i+1] = Math.max(0, Math.min(255, g));
      dst[i+2] = Math.max(0, Math.min(255, b));
      dst[i+3] = src[i+3];
    }

    ctx.putImageData(imageData, 0, 0);

    canvas.style.display = 'block';
    document.getElementById('canvas-placeholder').style.display = 'none';
    document.getElementById('dl-btn').classList.add('active');
    processing.classList.remove('show');
  }, 30);
}

// ── プリセット ──
const presets = {
  standard: { saturation:140, contrast:130, brightness:108, grain:28, vignette:60, warmth:12 },
  vivid:    { saturation:185, contrast:155, brightness:112, grain:18, vignette:55, warmth:20 },
  faded:    { saturation:85,  contrast:95,  brightness:115, grain:35, vignette:40, warmth:-8 },
  night:    { saturation:120, contrast:160, brightness:88,  grain:55, vignette:85, warmth:-15 },
};

function applyPreset(name) {
  const p = presets[name];
  Object.entries(p).forEach(([id, val]) => {
    const el = document.getElementById(id);
    el.value = val;
    updateSlider(el);
  });
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(name));
  });
  processImage();
}

// ── ダウンロード ──
function downloadImage() {
  const canvas = document.getElementById('output-canvas');
  const link = document.createElement('a');
  link.download = 'retro_camera_' + Date.now() + '.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.92);
  link.click();
}
</script>
</body>
</html>
